<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inscricao.css">
    <title>Inscrição para o ENEM</title>
</head>

<body>

<header>
    <h1>Portal do Candidato - ENEM</h1>
  <nav>
    <a href="painel.html">Painel</a>
    <a href="cursos.html">Cursos</a>
    <a href="inscricao.html">Inscrição</a>
    <a href="login.html">Sair</a>
  </nav>
</header>

<h2>Inscrição ENEM</h2>

<form id="formInscricao">

    
    <label for="nome">Nome Completo:</label><br>
    <input type="text" id="nome" required><br>
    <br>

    <label for="idade">Idade:</label><br>
    <input type="number" id="idade" required><br>
    <br>

    
    <label for="data_nascimento">Data de nascimento:</label><br>
    <input type="date" id="data_nascimento" required><br>
    <br>

    
    <label for="cpf">CPF:</label><br>
    <input type="text" id="cpf" required><br>
    <br>
    
    <label for="lingua">Língua Estrangeira:</label><br>
    <select id="lingua" required>
        <option value="">Selecione</option>
        <option value="Inglês">Inglês</option>
        <option value="Espanhol">Espanhol</option>
         </select>

    <br><br>
    
    <label for="pai">Nome do pai:</label><br>
    <input type="text" id="pai"><br>

    <input type="radio" id="pai_nao_consta" name="pai_info" value="Não consta">
    <label for="pai_nao_consta">Não consta</label><br>
    <br>

    
    <label for="mae">Nome da mãe:</label><br>
    <input type="text" id="mae"><br>

    <input type="radio" id="mae_nao_consta" name="mae_info" value="Não consta">
    <label for="mae_nao_consta">Não consta</label><br>
    <br>

    
    <label for="cidade">Cidade:</label><br>
    <input type="text" id="cidade" required><br>
    <br>

    
    <label for="endereco">Rua/Avenida:</label><br>
    <input type="text" id="endereco" required><br>
    <br>

    
    <label for="numero">Número:</label><br>
    <input type="number" id="numero" required><br>
    <br>


    <label for="estado">Estado:</label><br>
    <input type="text" id="estado" required><br>
    <br>

    
    <label for="pais">País:</label><br>
    <input type="text" id="pais" value="Brasil" required><br>
    <br>

    <label>Situação do Ensino Médio:</label><br>

    <input type="radio" id="concluido" name="ensino_medio" value="Concluído" required>
    <label for="concluido">Já concluí</label><br>

    <input type="radio" id="cursando" name="ensino_medio" value="Cursando">
    <label for="cursando">Estou cursando</label><br>
    <br>

    
    <label>Tipo de Escola:</label><br>

    <input type="radio" id="publica" name="escola" value="Pública" required>
    <label for="publica">Pública</label><br>

    <input type="radio" id="privada" name="escola" value="Privada">
    <label for="privada">Privada</label><br>
    <br>

    
    <label for="telefone">Telefone:</label><br>
    <input type="tel" id="telefone" required><br>
    <br>

    
    <label>Nacionalidade:</label><br>

    <input type="radio" id="brasileiro" name="nacionalidade" value="Brasileiro(a)" required>
    <label for="brasileiro">Brasileiro(a)</label><br>

    <input type="radio" id="naturalizado" name="nacionalidade" value="Naturalizado">
    <label for="naturalizado">Brasileiro(a) naturalizado</label><br>

    <input type="radio" id="estrangeiro" name="nacionalidade" value="Estrangeiro">
    <label for="estrangeiro">Estrangeiro(a)</label><br>

    <input type="radio" id="nato" name="nacionalidade" value="Nato exterior">
    <label for="nato">Brasileiro(a) nato nascido no exterior</label><br>
    <br>

    
    <label>Raça/Cor:</label><br>

    <input type="radio" id="branca" name="raca" value="Branca" required>
    <label for="branca">Branca</label><br>

    <input type="radio" id="preta" name="raca" value="Preta">
    <label for="preta">Preta</label><br>

    <input type="radio" id="parda" name="raca" value="Parda">
    <label for="parda">Parda</label><br>

    <input type="radio" id="amarela" name="raca" value="Amarela">
    <label for="amarela">Amarela</label><br>

    <input type="radio" id="indigena" name="raca" value="Indígena">
    <label for="indigena">Indígena</label><br>
    <br>

    
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" required><br>
    <br>

    
    <label for="senha">Senha:</label><br>
    <input type="password" id="senha" minlength="8" required><br>
    <br>

    
    <label for="confirmarSenha">Confirmar Senha:</label><br>
    <input type="password" id="confirmarSenha" minlength="8" required><br>
    <br>

    <p id="mensagemErro"></p>

    
    <button type="submit" class="btn">Salvar Inscrição</button>

    <button type="button" onclick="window.location.href='login.html'">
        Voltar
    </button>

</form>

<footer>
    <p>© 2026 - Sistema de Inscrição ENEM. Todos os direitos reservados.</p>
</footer>

<script src="inscricao.js"></script>

</body>
</html>
